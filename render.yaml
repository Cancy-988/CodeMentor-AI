services:
  - type: web
    name: codementor-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        value: "${{DATABASE_URL}}"
      - key: GEMINI_API_KEY
        value: "${{GEMINI_API_KEY}}"
      - key: GEMINI_MODEL
        value: "${{GEMINI_MODEL}}"
      - key: SUPABASE_URL
        value: "${{SUPABASE_URL}}"
      - key: SUPABASE_ANON_KEY
        value: "${{SUPABASE_ANON_KEY}}"
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "${{SUPABASE_SERVICE_ROLE_KEY}}"
      - key: CORS_ORIGINS
        value: "${{CORS_ORIGINS}}"
      - key: FRONTEND_URL
        value: "${{FRONTEND_URL}}"
